<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Success</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background:
                radial-gradient(circle at 20% 20%, #dcfce7 0%, transparent 35%),
                radial-gradient(circle at 80% 80%, #bbf7d0 0%, transparent 35%),
                #f0fdf4;
            color: #14532d;
            overflow: hidden;
        }
        .wrap {
            text-align: center;
            padding: 32px;
        }
        .icon-ring {
            width: 132px;
            height: 132px;
            margin: 0 auto 20px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow:
                0 20px 45px rgba(22, 163, 74, 0.35),
                0 0 0 10px rgba(34, 197, 94, 0.12),
                0 0 0 20px rgba(34, 197, 94, 0.07);
            animation: pop 550ms ease-out;
        }
        .check {
            width: 54px;
            height: 28px;
            border-left: 7px solid #fff;
            border-bottom: 7px solid #fff;
            transform: rotate(-45deg) translateY(-4px);
            border-radius: 2px;
        }
        h1 {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }
        p {
            font-size: 16px;
            color: #166534;
            opacity: 0.86;
        }
        @keyframes pop {
            0% { transform: scale(0.75); opacity: 0; }
            70% { transform: scale(1.06); opacity: 1; }
            100% { transform: scale(1); }
        }
        @media (max-width: 500px) {
            .icon-ring { width: 110px; height: 110px; }
            .check { width: 46px; height: 24px; border-left-width: 6px; border-bottom-width: 6px; }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="icon-ring" aria-hidden="true">
            <span class="check"></span>
        </div>
        <h1>Success</h1>
    </main>
</body>
</html>
